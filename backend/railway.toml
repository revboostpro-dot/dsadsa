[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate --schema=prisma/schema.pg.prisma && npx prisma migrate deploy --schema=prisma/schema.pg.prisma"

[deploy]
startCommand = "node -e \"require('./prisma/seed.js')\" || true && node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "backend"
