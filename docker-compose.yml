version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: qr-worker-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: qrworker
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d qrworker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qr-worker-backend
    restart: always
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@db:5432/qrworker?schema=public
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=*
      - LOG_LEVEL=info
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
