server {
    listen 80;
    server_name localhost;

    # DNS resolver for runtime resolution (Google DNS)
    resolver 8.8.8.8 8.8.4.4 valid=30s;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Railway Backend dynamically
    location /api/ {
        set $backend_api https://backend-production-ebd78.up.railway.app/api/;
        proxy_pass $backend_api;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host backend-production-ebd78.up.railway.app;
        proxy_cache_bypass $http_upgrade;

        # Enable SSL Server Name Indication (SNI)
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    # Proxy Socket.IO WebSocket traffic to Railway Backend dynamically
    location /socket.io/ {
        set $backend_socket https://backend-production-ebd78.up.railway.app/socket.io/;
        proxy_pass $backend_socket;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host backend-production-ebd78.up.railway.app;

        # Enable SSL Server Name Indication (SNI)
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
